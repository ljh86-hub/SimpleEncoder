name: Build SimpleEncoder (onedir)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter pillow tkinterdnd2

      - name: Download FFmpeg
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip" -UseBasicParsing
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_tmp" -Force
          New-Item -ItemType Directory -Force -Path "ffmpeg"
          $ffmpeg = Get-ChildItem -Recurse "ffmpeg_tmp" -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpeg.FullName "ffmpeg\ffmpeg.exe"
          $ffprobe = Get-ChildItem -Recurse "ffmpeg_tmp" -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $ffprobe.FullName "ffmpeg\ffprobe.exe"
        shell: powershell

      - name: Build (onedir)
        run: python -m PyInstaller SimpleEncoder.spec --noconfirm --clean

      - name: Zip the folder
        run: |
          Compress-Archive -Path "dist\SimpleEncoder\*" -DestinationPath "SimpleEncoder.zip" -Force
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleEncoder
          path: SimpleEncoder.zip
